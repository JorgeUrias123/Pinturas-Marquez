<section id="confianza">

  <div class="section-header">
    <div class="section-tag">¿Por qué elegirnos?</div>
    <h2 class="section-title">Familia, calidad <em>y trato directo</em></h2>
  </div>

  <div class="trust-grid">

    @for ( item of items; track item.titulo) {
      <div class="trust-card">
        <div class="trust icon">
          <img [src]="item.icon" alt="">
        </div>
        <h3 class="trust-titulo">{{ item.titulo }}</h3>
        <p class="trust-desc">{{ item.desc }}</p>
      </div>
    }
  </div>
</section>
